<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dock Space Availability in China</title>

<style>
body{margin:0;font-family:Arial;background:#f6f8fb}
.wrap{width:90%;margin:auto}
header{background:#fff;padding:15px;border-bottom:1px solid #ddd}
.btn{padding:10px 15px;border-radius:20px;border:none;background:#F59E0B;cursor:pointer}
.btn2{background:#fff;border:1px solid #ccc}
.hero{background:#0B3C5D;color:white;padding:60px 0}
.card{background:white;padding:20px;border-radius:10px;margin:10px 0}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5)}
.modal.show{display:block}
.box{background:white;margin:10% auto;padding:20px;width:90%;max-width:600px;border-radius:10px}
.lang-cn{display:none}
.zh .lang-en{display:none}
.zh .lang-cn{display:inline}
</style>

<script>
function toggleLang(){
  document.body.classList.toggle("zh");
}

function openModal(){
  document.getElementById("modal").classList.add("show");
}
function closeModal(){
  document.getElementById("modal").classList.remove("show");
}

function submitForm(e){
  e.preventDefault();

  let form=document.getElementById("form");
  let data=new FormData(form);

  fetch("https://formspree.io/f/xqewodbg",{
    method:"POST",
    body:data,
    headers:{'Accept':'application/json'}
  }).then(()=>{
    alert("✅ 已发送 / Sent successfully");
    form.reset();
  }).catch(()=>{
    alert("❌ 发送失败，请直接发邮件 info@dockingadvisory.cn");
  });
}
</script>
</head>

<body>

<header>
<div class="wrap">
<b>⚓ Dock Space Gateway</b>

<button class="btn2" onclick="toggleLang()">EN / 中文</button>
<button class="btn" onclick="openModal()">
<span class="lang-en">Find Dock Space</span>
<span class="lang-cn">寻找坞期</span>
</button>
</div>
</header>

<section class="hero">
<div class="wrap">
<h1>
<span class="lang-en">Find Real Dock Space Availability in China</span>
<span class="lang-cn">寻找中国真实可用坞期</span>
</h1>

<p>
<span class="lang-en">No vessel name required. No data shared.</span>
<span class="lang-cn">无需船名，信息完全保密</span>
</p>

<button class="btn" onclick="openModal()">
<span class="lang-en">Submit Requirement</span>
<span class="lang-cn">提交需求</span>
</button>
</div>
</section>

<div class="wrap">

<div class="card">
<h3>Dockspace Matching</h3>
<p>
<span class="lang-en">Submit docking requirement confidentially</span>
<span class="lang-cn">提交坞修需求（保密）</span>
</p>
</div>

<div class="card">
<h3>Why us</h3>
<p>
<span class="lang-en">Built by shipyard insider</span>
<span class="lang-cn">基于船厂真实经验</span>
</p>
</div>

</div>

<!-- Modal -->
<div class="modal" id="modal">
<div class="box">

<button onclick="closeModal()">X</button>

<h2>
<span class="lang-en">Submit Requirement</span>
<span class="lang-cn">提交需求</span>
</h2>

<form id="form" onsubmit="submitForm(event)">

<input name="Name" placeholder="Name / 姓名" required><br><br>
<input name="Company" placeholder="Company / 公司" required><br><br>
<input name="Email" placeholder="Email" required><br><br>
<input name="Vessel" placeholder="Vessel Type"><br><br>
<input name="DWT" placeholder="DWT"><br><br>
<textarea name="Scope" placeholder="Repair Scope"></textarea><br><br>

<button class="btn">
<span class="lang-en">Send</span>
<span class="lang-cn">发送</span>
</button>

</form>

</div>
</div>

</body>
</html>
